<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCOT Free by EduRaj Consult – Ace Your Exams · 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,400&display=swap"
      rel="stylesheet"
    />
    <script>
      // GitHub Pages SPA redirect handler
      (function() {
        var p = window.location.search.match(/[?&]p=([^&]*)/);
        if (p) {
          window.history.replaceState(null, null,
            window.location.pathname.split('/').slice(0, 2).join('/') + '/' +
            p[1].replace(/~and~/g, '&') +
            (window.location.search.match(/[?&]q=([^&]*)/) ? '?' + window.location.search.match(/[?&]q=([^&]*)/)[1].replace(/~and~/g, '&') : '') +
            window.location.hash
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
